### model
model_name_or_path: OpenGVLab/InternVL3_5-2B-HF
image_max_pixels: 1568784

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 16
lora_target: all

### dataset
dataset: squad_v2_train
template: intern_vl
media_dir: /mnt/VLAI_data/output/squad_v2/
cutoff_len: 4096
# max_samples: 100  # for quick testing
max_new_tokens: 128
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/intern3_5vl-2b-1e/lora/sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
seed: 42 
per_device_train_batch_size: 3
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

flash_attn: fa2
enable_liger_kernel: true
use_unsloth_gc: true
# deepspeed: examples/deepspeed/ds_z0_config.json

